# ==============================================================================
# Translation Model InferenceServices
# ==============================================================================
# This file contains all the translation model deployments for the
# Machine Translation InferenceGraph.
#
# Models:
# - Qwen-MT-7B: Chinese/Japanese/Korean specialist
# - NLLB-200-3.3B: Generalist (200+ languages)
# - Llama-3.1-8B-Instruct: Spanish, literary content
# - Mistral-Nemo-12B: French, long documents
# - Gemma-X2-28-9B: Arabic specialist
# - Qwen2-1.5B-Instruct: Fast/real-time translation
# - NLLB-200-distilled-1.3B: Technical documentation
# ==============================================================================

---
# ==============================================================================
# Qwen-MT-7B: Chinese/Japanese/Korean Specialist
# ==============================================================================
# Best for: EN-ZH translation, outperforms GPT-4 in fluency
# GPU: 1x A100 (40GB) or 2x A10

apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: qwen-mt-7b
  namespace: ml-inference
  labels:
    app: qwen-mt-7b
    app.kubernetes.io/part-of: ml-inference-platform
    app.kubernetes.io/component: translation-model
    translation.ml-inference.io/specialization: asian
  annotations:
    security.ml-inference.io/model-classification: "INTERNAL"
    serving.kserve.io/enable-streaming: "true"
    description: "Qwen-MT-7B: Specialized for Chinese, Japanese, Korean translation"
spec:
  transformer:
    containers:
      - name: auth-transformer
        image: auth-transformer:latest
        imagePullPolicy: IfNotPresent
        ports:
          - containerPort: 8080
            protocol: TCP
        env:
          - name: MODEL_CLASSIFICATION
            value: "INTERNAL"
          - name: PREDICTOR_HOST
            value: "localhost:8000"
        envFrom:
          - configMapRef:
              name: external-services-config
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

  predictor:
    containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        args:
          - "--model=Qwen/Qwen-MT-7B"
          - "--served-model-name=qwen-mt-7b"
          - "--tensor-parallel-size=1"
          - "--max-model-len=8192"
          - "--trust-remote-code"
          - "--host=0.0.0.0"
          - "--port=8000"
          - "--disable-log-requests"
          - "--gpu-memory-utilization=0.9"
        ports:
          - containerPort: 8000
            protocol: TCP
            name: http
        env:
          - name: HF_TOKEN
            valueFrom:
              secretKeyRef:
                name: huggingface-credentials
                key: token
                optional: true
        resources:
          requests:
            cpu: "2"
            memory: "32Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "8"
            memory: "64Gi"
            nvidia.com/gpu: "1"
        volumeMounts:
          - name: model-storage
            mountPath: /root/.cache/huggingface
          - name: shm
            mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 10
    volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: qwen-mt-7b-model-storage
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: "8Gi"
    minReplicas: 0
    maxReplicas: 3
    scaleTarget: 2
    scaleMetric: concurrency

