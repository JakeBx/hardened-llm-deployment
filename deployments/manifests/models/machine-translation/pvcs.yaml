# ==============================================================================
# Persistent Volume Claims for Machine Translation Models
# ==============================================================================
# Storage for model caches to avoid re-downloading models on pod restart
# ==============================================================================

---
# LID FastText Model Cache
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lid-fasttext-model-cache
  namespace: ml-inference
  labels:
    app: lid-fasttext
    app.kubernetes.io/part-of: ml-inference-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ml-inference-ssd
  resources:
    requests:
      storage: 2Gi

