apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-service-stubs
  namespace: ml-inference
  labels:
    app: external-service-stubs
    app.kubernetes.io/part-of: ml-inference-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-service-stubs
  template:
    metadata:
      labels:
        app: external-service-stubs
    spec:
      containers:
        - name: stubs
          image: external-service-stubs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: SERVICE_TYPE
              value: "all"
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: external-service-stubs
  namespace: ml-inference
  labels:
    app: external-service-stubs
    app.kubernetes.io/part-of: ml-inference-platform
spec:
  selector:
    app: external-service-stubs
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
