# =============================================================================
# Full Stack Local Testing for SmolLM2-135M (Option 3)
# =============================================================================
#
# This docker-compose file sets up the complete auth transformer + inference stack
# for local testing, including external service stubs for ABAC, Classification,
# Audit, and Observability services.
#
# Architecture:
#   Client -> Auth Transformer (8080) -> SmolLM2 Server (8000)
#                    |
#                    +-> External Stubs (8081) [ABAC, Classification, Audit, Observability]
#
# The default configuration uses the HuggingFace SmolLM2-135M model with
# transformers for CPU-friendly inference (no GPU required).
#
# PROFILES:
#   - Default (no profile): Uses SmolLM2-135M with HuggingFace transformers
#   - GPU profile: Uses real vLLM with GPU support (for larger models)
#
# Usage (SmolLM2-135M - no GPU required):
#   cd deployments
#   docker compose -f docker-compose.local.yaml build
#   docker compose -f docker-compose.local.yaml up -d
#
# Usage (Real vLLM - requires NVIDIA GPU):
#   cd deployments
#   docker compose -f docker-compose.local.yaml --profile gpu up -d
#
# Test:
#   curl http://localhost:8080/health  # Auth transformer
#   curl http://localhost:8000/health  # SmolLM2 server direct
#   curl http://localhost:8081/health  # External stubs
#
# =============================================================================

services:
  # ===========================================================================
  # External Service Stubs (ABAC, Classification, Audit, Observability)
  # ===========================================================================
  # Provides stub implementations for all external services that the auth
  # transformer depends on. In production, these would be replaced with
  # actual enterprise services.
  #
  # Endpoints:
  #   - POST /authorize      (ABAC authorization)
  #   - POST /combine        (Classification combining)
  #   - POST /audit-events   (Audit logging)
  #   - GET  /audit-events   (View logged events - debug)
  #   - POST /metrics        (Observability metrics)
  #   - GET  /metrics/summary (View metrics - debug)
  # ===========================================================================
  external-stubs:
    build:
      context: ./external-service-stubs
      dockerfile: Dockerfile
    container_name: smollm-external-stubs
    ports:
      - "8081:8080"
    environment:
      - SERVICE_TYPE=all
      - PORT=8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - smollm-network
    restart: unless-stopped

  # ===========================================================================
  # Auth Transformer - Authorization Layer
  # ===========================================================================
  # The auth transformer sits in front of vLLM and provides:
  #   - ABAC authorization via external service
  #   - Data classification aggregation
  #   - Audit logging (async, fire-and-forget)
  #   - Observability metrics (async, fire-and-forget)
  #   - Streaming support with pre-computed classification headers
  #
  # Headers expected from clients:
  #   - x-client-dn: User's distinguished name (e.g., CN=user,OU=org)
  #   - x-data-classification: Classification of input data
  #
  # Headers added to responses:
  #   - x-aggregated-classification: Combined classification level
  #   - x-model-classification: Model's classification level
  # ===========================================================================
  auth-transformer:
    build:
      context: ./auth-transformer
      dockerfile: Dockerfile
    container_name: smollm-auth-transformer
    ports:
      - "8080:8080"
    environment:
      # Model configuration
      - MODEL_CLASSIFICATION=INTERNAL
      
      # Predictor - use Docker service name and internal port
      # Works with both mock-vllm and real vllm services
      - PREDICTOR_HOST=vllm:8000
      
      # External services - all pointing to stubs container
      - ABAC_SERVICE_URL=http://external-stubs:8080
      - CLASSIFICATION_SERVICE_URL=http://external-stubs:8080
      - AUDIT_SERVICE_URL=http://external-stubs:8080
      - OBSERVABILITY_SERVICE_URL=http://external-stubs:8080
    depends_on:
      external-stubs:
        condition: service_healthy
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - smollm-network
    restart: unless-stopped

  # ===========================================================================
  # SmolLM2-135M Server (Default - No GPU Required)
  # ===========================================================================
  # Uses HuggingFace SmolLM2-135M-Instruct model for real inference.
  # Small enough to run efficiently on CPU for local development.
  #
  # Implements OpenAI-compatible API:
  #   - GET /health
  #   - GET /v1/models
  #   - POST /v1/chat/completions (streaming and non-streaming)
  #   - POST /v1/completions
  #
  # Model is downloaded from HuggingFace on first run (~270MB).
  # ===========================================================================
  vllm:
    build:
      context: ./mock-vllm
      dockerfile: Dockerfile
    container_name: smollm-vllm
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/app/.cache/huggingface
    environment:
      - MODEL_NAME=HuggingFaceTB/SmolLM2-135M-Instruct
      - DEVICE=cpu
      - MAX_MODEL_LENGTH=2048
      - RESPONSE_DELAY_MS=10
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - smollm-network
    restart: unless-stopped

  # ===========================================================================
  # Real vLLM Server (GPU Profile - Requires NVIDIA GPU)
  # ===========================================================================
  # Actual vLLM server running SmolLM-360M.
  # Requires NVIDIA GPU with CUDA support.
  #
  # To use: docker compose -f docker-compose.local.yaml --profile gpu up -d
  # ===========================================================================
  vllm-gpu:
    profiles: ["gpu"]
    image: vllm/vllm-openai:latest
    container_name: smollm-vllm-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    command: >
      --model HuggingFaceTB/SmolLM-360M
      --served-model-name smollm-360m
      --trust-remote-code
      --max-model-len 2048
      --host 0.0.0.0
      --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - smollm-network
    restart: unless-stopped

# =============================================================================
# Network Configuration
# =============================================================================
networks:
  smollm-network:
    driver: bridge
    name: smollm-local-network
